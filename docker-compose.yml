services:
  redis:
    image: redis:7-alpine
    container_name: decision-tree-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:latest
    container_name: decision-tree-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redis_data:
